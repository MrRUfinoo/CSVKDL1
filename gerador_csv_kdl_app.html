<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerador de CSV — Relés KDL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #101418; }
  * { box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; }
  ::selection { background: #e8a33d55; }
  input:focus, select:focus { outline: 2px solid #e8a33d; outline-offset: 1px; }
  button:focus-visible { outline: 2px solid #e8a33d; outline-offset: 2px; }
  table { border-collapse: collapse; }
  .cellinput { background: transparent; border: none; color: inherit; font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 100%; padding: 2px 4px; }
  .cellinput:focus { background: #23292f; border-radius: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useRef, useEffect } = React;

// ---------- tiny inline icon set (no external icon lib needed) ----------
const Icon = {
  Check: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
  Alert: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  Sheet: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/></svg>,
  Zap: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  Download: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  Plus: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  X: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Refresh: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9 9 0 0 1-9-9 9 9 0 0 1 9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
  Radio: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-8.49a6 6 0 0 0 0 8.49M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>,
};

// ---------- local storage helper (replaces Claude's window.storage) ----------
const localDB = {
  get: (key) => {
    try {
      const raw = localStorage.getItem("kdlcsv:" + key);
      return raw ? { value: raw } : null;
    } catch (e) { return null; }
  },
  set: (key, value) => {
    try {
      localStorage.setItem("kdlcsv:" + key, value);
      return { key, value };
    } catch (e) { return null; }
  },
};

// ---------- helpers ----------

const norm = (s) =>
  String(s ?? "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toLowerCase();

function toSig10(num) {
  if (num === null || num === undefined || num === "" || isNaN(num)) return "";
  const n = Number(num);
  if (n === 0) return "0";
  let s = n.toPrecision(10);
  if (s.includes("e") || s.includes("E")) {
    s = n.toFixed(10);
  }
  if (s.includes(".")) {
    s = s.replace(/0+$/, "").replace(/\.$/, "");
  }
  return s;
}

function findHeaderRow(rows, mustHave) {
  for (let i = 0; i < Math.min(rows.length, 15); i++) {
    const cells = rows[i].map(norm);
    if (mustHave.every((m) => cells.some((c) => c.includes(m)))) return i;
  }
  return -1;
}

function colIndex(headerRow, candidates) {
  const normed = headerRow.map(norm);
  for (const cand of candidates) {
    const idx = normed.findIndex((c) => c === norm(cand));
    if (idx !== -1) return idx;
  }
  for (const cand of candidates) {
    const idx = normed.findIndex((c) => c.includes(norm(cand)));
    if (idx !== -1) return idx;
  }
  return -1;
}

function parseWorkbook(arrayBuffer) {
  return XLSX.read(arrayBuffer, { type: "array" });
}

function sheetToRows(wb, sheetName) {
  const ws = wb.Sheets[sheetName];
  return XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: "" });
}

// ---------- report parsing ----------

function extractReportRows(wb) {
  const sheetName =
    wb.SheetNames.find((n) => norm(n).includes("relat")) || wb.SheetNames[0];
  const rows = sheetToRows(wb, sheetName);
  const headerIdx = findHeaderRow(rows, ["poste", "serial", "produto"]);
  if (headerIdx === -1) {
    throw new Error(
      "Não encontrei o cabeçalho esperado (Poste Nº / Produto / Serial) nesse relatório."
    );
  }
  const header = rows[headerIdx];
  const cPoste = colIndex(header, ["poste no", "poste n", "poste"]);
  const cProduto = colIndex(header, ["produto"]);
  const cSerial = colIndex(header, ["serial"]);
  const cAcao = colIndex(header, ["acao", "ação"]);
  const cLogradouro = colIndex(header, ["logradouro"]);
  const cBairro = colIndex(header, ["bairro"]);

  if (cPoste === -1 || cSerial === -1 || cProduto === -1) {
    throw new Error(
      "Não encontrei as colunas Poste Nº, Produto e Serial nesse relatório."
    );
  }

  const out = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.every((c) => c === "" || c === null || c === undefined)) continue;
    const produto = String(r[cProduto] ?? "");
    const serial = String(r[cSerial] ?? "").trim();
    const acao = cAcao !== -1 ? norm(r[cAcao]) : "";
    if (!norm(produto).includes("kdl")) continue;
    if (!serial) continue;
    if (cAcao !== -1 && acao && acao.includes("retirado")) continue;
    const poste = String(r[cPoste] ?? "").trim();
    if (!poste) continue;
    out.push({
      poste,
      serial,
      logradouro: cLogradouro !== -1 ? String(r[cLogradouro] ?? "") : "",
      bairro: cBairro !== -1 ? String(r[cBairro] ?? "") : "",
    });
  }
  return out;
}

// ---------- reference (SIIP) parsing ----------

function extractReference(wb) {
  let sheetName = wb.SheetNames.find((n) => norm(n) === "siip");
  let rows, headerIdx, header;
  const tryHeader = (rws) => findHeaderRow(rws, ["poste", "latitude", "longitude"]);

  if (sheetName) {
    rows = sheetToRows(wb, sheetName);
    headerIdx = tryHeader(rows);
  }
  if (!sheetName || headerIdx === -1) {
    for (const n of wb.SheetNames) {
      const rws = sheetToRows(wb, n);
      const hIdx = tryHeader(rws);
      if (hIdx !== -1) {
        sheetName = n;
        rows = rws;
        headerIdx = hIdx;
        break;
      }
    }
  }
  if (!rows || headerIdx === undefined || headerIdx === -1) {
    throw new Error(
      "Não encontrei a tabela de referência (colunas Nº Poste / Latitude / Longitude) nesse arquivo."
    );
  }
  header = rows[headerIdx];
  const cPoste = colIndex(header, ["poste no", "poste n", "poste"]);
  const cLat = colIndex(header, ["latitude"]);
  const cLong = colIndex(header, ["longitude"]);
  const cLogr = colIndex(header, ["logradouro"]);
  const cBairro = colIndex(header, ["bairro"]);

  const map = new Map();
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r) continue;
    const poste = String(r[cPoste] ?? "").trim();
    if (!poste) continue;
    if (map.has(poste)) continue; // primeiro match, como VLOOKUP
    map.set(poste, {
      lat: cLat !== -1 ? r[cLat] : "",
      long: cLong !== -1 ? r[cLong] : "",
      logradouro: cLogr !== -1 ? r[cLogr] : "",
      bairro: cBairro !== -1 ? r[cBairro] : "",
    });
  }
  return map;
}

// ---------- build final rows ----------

function buildRows(reportRows, refMap) {
  const counts = new Map();
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  return reportRows.map((row) => {
    const n = counts.get(row.poste) || 0;
    counts.set(row.poste, n + 1);
    const suffix = n === 0 ? "" : letters[n - 1] || `_${n}`;
    const ref = refMap.get(row.poste);
    const found = !!ref;
    return {
      simuc: row.serial,
      sincom: "",
      x: found ? toSig10(ref.lat) : "",
      y: found ? toSig10(ref.long) : "",
      p1: 1,
      p2: 49,
      p3: 1,
      plaqueta: row.poste + suffix,
      endereco: found ? ref.logradouro : "",
      bairro: found ? ref.bairro : "",
      procv: row.poste,
      found,
    };
  });
}

function buildCsv(rows, sincomOverride) {
  const lines = rows.map((r) => {
    const fields = [
      r.simuc,
      sincomOverride || r.sincom,
      r.x,
      r.y,
      r.p1,
      r.p2,
      r.p3,
      r.plaqueta,
      r.endereco,
      r.bairro,
      r.procv,
      "",
      "",
      "",
      "",
    ];
    return fields.join(";");
  });
  return lines.join("\r\n");
}

// ---------- UI ----------

function Dropzone({ label, hint, file, onFile, accent, icon: IconComp }) {
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);

  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={(e) => {
        e.preventDefault();
        setDrag(false);
        const f = e.dataTransfer.files?.[0];
        if (f) onFile(f);
      }}
      onClick={() => inputRef.current?.click()}
      style={{
        border: `1.5px dashed ${drag ? accent : "#3a4048"}`,
        borderRadius: 10,
        padding: "22px 18px",
        cursor: "pointer",
        background: drag ? `${accent}14` : "#1a1f24",
        transition: "all .15s ease",
        display: "flex",
        alignItems: "center",
        gap: 14,
      }}
    >
      <input
        ref={inputRef}
        type="file"
        accept=".xlsx,.xls,.csv"
        style={{ display: "none" }}
        onChange={(e) => {
          const f = e.target.files?.[0];
          if (f) onFile(f);
          e.target.value = "";
        }}
      />
      <div style={{ width: 38, height: 38, borderRadius: 8, background: file ? `${accent}22` : "#22282f", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        {file ? <Icon.Check size={19} color={accent} /> : <IconComp size={18} color="#7a828c" />}
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{ color: "#e8ecef", fontSize: 13.5, fontWeight: 600 }}>{label}</div>
        <div style={{ color: file ? accent : "#7a828c", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {file ? file.name : hint}
        </div>
      </div>
    </div>
  );
}

function Led({ ok }) {
  return <span style={{ display: "inline-block", width: 7, height: 7, borderRadius: "50%", background: ok ? "#4fd1a5" : "#3a4048", boxShadow: ok ? "0 0 6px #4fd1a5aa" : "none", marginRight: 7 }} />;
}

function App() {
  const [reportFile, setReportFile] = useState(null);
  const [refFile, setRefFile] = useState(null);
  const [rows, setRows] = useState(null);
  const [error, setError] = useState("");
  const [processing, setProcessing] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [sincomList, setSincomList] = useState([]);
  const [sincomChoice, setSincomChoice] = useState("");
  const [newSincom, setNewSincom] = useState("");
  const [filename, setFilename] = useState("");

  useEffect(() => {
    const res = localDB.get("sincom-list");
    if (res?.value) {
      try { setSincomList(JSON.parse(res.value)); } catch (e) {}
    }
  }, []);

  const process = useCallback(async (rf, xf) => {
    if (!rf || !xf) return;
    setProcessing(true);
    setError("");
    try {
      const [rBuf, xBuf] = await Promise.all([rf.arrayBuffer(), xf.arrayBuffer()]);
      const reportWb = parseWorkbook(rBuf);
      const refWb = parseWorkbook(xBuf);
      const reportRows = extractReportRows(reportWb);
      if (reportRows.length === 0) {
        throw new Error("Nenhum relé KDL com Serial encontrado nesse relatório.");
      }
      const refMap = extractReference(refWb);
      const built = buildRows(reportRows, refMap);
      setRows(built);
      const firstFound = built.find((b) => b.found);
      if (firstFound) {
        setFilename(`CSV_IDT_${firstFound.endereco}`.replace(/\s+/g, "_").toUpperCase());
      }
    } catch (e) {
      setError(e.message || String(e));
      setRows(null);
    } finally {
      setProcessing(false);
    }
  }, []);

  useEffect(() => {
    if (reportFile && refFile) process(reportFile, refFile);
  }, [reportFile, refFile, process]);

  const missingCount = rows ? rows.filter((r) => !r.found).length : 0;

  const updateCell = (idx, key, value) => {
    setRows((prev) => {
      const copy = [...prev];
      copy[idx] = { ...copy[idx], [key]: value };
      return copy;
    });
  };

  const openExportModal = () => {
    setSincomChoice(sincomList[0] || "");
    setModalOpen(true);
  };

  const saveSincom = (val) => {
    if (!val) return;
    const list = [val, ...sincomList.filter((s) => s !== val)].slice(0, 12);
    setSincomList(list);
    localDB.set("sincom-list", JSON.stringify(list));
  };

  const doExport = () => {
    const finalSincom = newSincom.trim() || sincomChoice;
    if (!finalSincom) return;
    saveSincom(finalSincom);
    const csv = buildCsv(rows, finalSincom);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const fname = (filename || "CSV_KDL_EXPORT").replace(/\.csv$/i, "") + ".csv";
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    setModalOpen(false);
    setNewSincom("");
  };

  const reset = () => {
    setReportFile(null);
    setRefFile(null);
    setRows(null);
    setError("");
  };

  const accent = "#e8a33d";

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', sans-serif", background: "#101418", minHeight: "100vh", color: "#e8ecef", padding: "28px 20px 60px" }}>
      <div style={{ maxWidth: 980, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
          <div style={{ width: 34, height: 34, borderRadius: 8, background: "#1a1f24", border: `1px solid ${accent}55`, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon.Zap size={18} color={accent} />
          </div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: 0.2 }}>Gerador de CSV — Relés KDL</div>
            <div style={{ fontSize: 12, color: "#7a828c", fontFamily: "'IBM Plex Mono', monospace" }}>relatório SIIP → planilha de referência → CSV pronto</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 18, margin: "24px 0 20px", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", color: "#9aa2ab" }}>
          <div style={{ display: "flex", alignItems: "center" }}><Led ok={!!reportFile} /> 01 RELATÓRIO</div>
          <div style={{ display: "flex", alignItems: "center" }}><Led ok={!!refFile} /> 02 REFERÊNCIA</div>
          <div style={{ display: "flex", alignItems: "center" }}><Led ok={!!rows} /> 03 REVISÃO</div>
          <div style={{ display: "flex", alignItems: "center" }}><Led ok={false} /> 04 EXPORTAR</div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Dropzone label="Relatório de Ordens (SIIP)" hint="arraste o .xlsx aqui ou clique" file={reportFile} onFile={setReportFile} accent={accent} icon={Icon.Sheet} />
          <Dropzone label="Planilha de referência (aba SIIP)" hint="arraste o .xlsx aqui ou clique" file={refFile} onFile={setRefFile} accent={accent} icon={Icon.Sheet} />
        </div>

        {processing && (
          <div style={{ marginTop: 18, color: "#9aa2ab", fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ display: "inline-flex", animation: "spin 1s linear infinite" }}><Icon.Refresh size={14} /></span>
            Processando planilhas…
          </div>
        )}

        {error && (
          <div style={{ marginTop: 18, background: "#3a1f1c", border: "1px solid #b4453c66", color: "#f0a89f", padding: "12px 14px", borderRadius: 8, fontSize: 13, display: "flex", gap: 10 }}>
            <Icon.Alert size={16} />
            <span>{error}</span>
          </div>
        )}

        {rows && (
          <div style={{ marginTop: 26 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 13, color: "#9aa2ab", fontFamily: "'IBM Plex Mono', monospace" }}>
                {rows.length} relé(s) KDL encontrados
                {missingCount > 0 && <span style={{ color: "#e8a33d" }}> · {missingCount} sem PROCV (revise abaixo)</span>}
              </div>
              <button onClick={reset} style={{ background: "none", border: "1px solid #3a4048", color: "#9aa2ab", borderRadius: 6, padding: "6px 10px", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                <Icon.X size={13} /> recomeçar
              </button>
            </div>

            {missingCount > 0 && (
              <div style={{ background: "#2b2418", border: "1px solid #e8a33d44", color: "#e8c483", padding: "10px 14px", borderRadius: 8, fontSize: 12.5, marginBottom: 12 }}>
                {missingCount} poste(s) não encontrados na planilha de referência — as linhas ficaram com lat/long em branco. Você pode preencher manualmente na tabela abaixo antes de exportar.
              </div>
            )}

            <div style={{ overflowX: "auto", border: "1px solid #262c33", borderRadius: 8 }}>
              <table style={{ width: "100%", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: "#1a1f24", color: "#7a828c", textAlign: "left" }}>
                    {["SIMUC", "X (lat)", "Y (long)", "PLAQUETA", "ENDEREÇO", "BAIRRO", "PROCV"].map((h) => (
                      <th key={h} style={{ padding: "8px 10px", fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r, i) => (
                    <tr key={i} style={{ borderTop: "1px solid #1e242a", background: r.found ? "transparent" : "#2b201c" }}>
                      <td style={{ padding: "2px 6px" }}>{r.simuc}</td>
                      <td style={{ padding: "2px 6px" }}><input className="cellinput" value={r.x} onChange={(e) => updateCell(i, "x", e.target.value)} /></td>
                      <td style={{ padding: "2px 6px" }}><input className="cellinput" value={r.y} onChange={(e) => updateCell(i, "y", e.target.value)} /></td>
                      <td style={{ padding: "2px 6px", fontFamily: "'IBM Plex Mono', monospace" }}>{r.plaqueta}</td>
                      <td style={{ padding: "2px 6px" }}><input className="cellinput" value={r.endereco} onChange={(e) => updateCell(i, "endereco", e.target.value)} /></td>
                      <td style={{ padding: "2px 6px" }}><input className="cellinput" value={r.bairro} onChange={(e) => updateCell(i, "bairro", e.target.value)} /></td>
                      <td style={{ padding: "2px 6px", fontFamily: "'IBM Plex Mono', monospace", color: "#7a828c" }}>{r.procv}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <button onClick={openExportModal} style={{ marginTop: 18, background: accent, color: "#1a1206", border: "none", borderRadius: 8, padding: "11px 20px", fontSize: 13.5, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
              <Icon.Download size={16} /> Gerar CSV
            </button>
          </div>
        )}
      </div>

      {modalOpen && (
        <div style={{ position: "fixed", inset: 0, background: "#00000099", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }} onClick={() => setModalOpen(false)}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: "#181d22", border: "1px solid #2b323a", borderRadius: 12, width: 380, maxWidth: "90vw", padding: 22, boxShadow: "0 20px 60px #00000066" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <Icon.Radio size={16} color={accent} />
              <div style={{ fontWeight: 700, fontSize: 15 }}>Concentradora (SINCOM)</div>
            </div>
            <div style={{ fontSize: 12, color: "#7a828c", marginBottom: 16 }}>Escolha uma SINCOM já usada ou crie uma nova para este lote.</div>

            {sincomList.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 11.5, color: "#9aa2ab", display: "block", marginBottom: 5 }}>SINCOM existente</label>
                <select value={sincomChoice} onChange={(e) => { setSincomChoice(e.target.value); setNewSincom(""); }} style={{ width: "100%", background: "#0f1317", border: "1px solid #2b323a", color: "#e8ecef", borderRadius: 6, padding: "8px 10px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>
                  {sincomList.map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            )}

            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11.5, color: "#9aa2ab", display: "block", marginBottom: 5 }}>Criar nova SINCOM</label>
              <input value={newSincom} onChange={(e) => setNewSincom(e.target.value)} placeholder="ex: 2406035" style={{ width: "100%", background: "#0f1317", border: "1px solid #2b323a", color: "#e8ecef", borderRadius: 6, padding: "8px 10px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }} />
            </div>

            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 11.5, color: "#9aa2ab", display: "block", marginBottom: 5 }}>Nome do arquivo</label>
              <input value={filename} onChange={(e) => setFilename(e.target.value)} placeholder="CSV_IDT_NOME_DA_RUA" style={{ width: "100%", background: "#0f1317", border: "1px solid #2b323a", color: "#e8ecef", borderRadius: 6, padding: "8px 10px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }} />
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setModalOpen(false)} style={{ flex: 1, background: "none", border: "1px solid #2b323a", color: "#9aa2ab", borderRadius: 7, padding: "9px 0", fontSize: 13, cursor: "pointer" }}>Cancelar</button>
              <button onClick={doExport} disabled={!newSincom.trim() && !sincomChoice} style={{ flex: 1.4, background: accent, border: "none", color: "#1a1206", borderRadius: 7, padding: "9px 0", fontSize: 13, fontWeight: 700, cursor: "pointer", opacity: (!newSincom.trim() && !sincomChoice) ? 0.5 : 1 }}>Baixar .csv</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
